name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

  type-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check out ConfFlow v1.4.2
        uses: actions/checkout@v4
        with:
          repository: moxuezhuchen/ConfFlow
          ref: v1.4.2
          path: .ci/confflow
          fetch-depth: 1

      - name: Install ConfFlow v1.4.2
        shell: pwsh
        run: |
          python -m build --wheel .ci/confflow --outdir .ci/confflow-dist
          $wheel = Get-ChildItem -LiteralPath .ci\confflow-dist -Filter "confflow-1.4.2-*.whl" | Select-Object -First 1
          if ($null -eq $wheel) { throw "ConfFlow v1.4.2 wheel was not built." }
          python -m pip install --no-deps $wheel.FullName
          python -c "import confflow; assert confflow.__version__ == '1.4.2'; print(confflow.__version__)"

      - name: MyPy type check
        run: python -m mypy src

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build package
        run: python -m build

  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      JOBDESK_REQUIRE_CONFFLOW_DIFFERENTIAL: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Check out ConfFlow v1.4.2
        uses: actions/checkout@v4
        with:
          repository: moxuezhuchen/ConfFlow
          ref: v1.4.2
          path: .ci/confflow
          fetch-depth: 1

      - name: Install ConfFlow v1.4.2
        shell: pwsh
        run: |
          python -m build --wheel .ci/confflow --outdir .ci/confflow-dist
          $wheel = Get-ChildItem -LiteralPath .ci\confflow-dist -Filter "confflow-1.4.2-*.whl" | Select-Object -First 1
          if ($null -eq $wheel) { throw "ConfFlow v1.4.2 wheel was not built." }
          python -m pip install $wheel.FullName
          python -c "import confflow; assert confflow.__version__ == '1.4.2'; print(confflow.__version__)"

      - name: Install ripgrep
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Public-tree guard
        shell: pwsh
        run: powershell -File scripts/check_public_tree.ps1

      - name: Test with coverage
        run: python -m pytest tests/ -v --basetemp ${{ runner.temp }}\jobdesk_pytest --cov=jobdesk_app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml
