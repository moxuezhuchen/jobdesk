# ============================================================================
# ConfFlow 配置示例 - 计算化学工作流配置
# ============================================================================

global:
  # --- 程序路径 ---
  gaussian_path: "/opt/g16/g16"
  orca_path: "/opt/orca601/orca"
  
  # --- 资源配置 ---
  cores_per_task: 12
  total_memory: "240GB"
  max_parallel_jobs: 4
  
  # --- 体系参数 ---
  charge: 0
  multiplicity: 1
  
  # --- 冻结原子坐标（仅对 opt/opt_freq 生效）---
  # 对 Gaussian: 在坐标行写 0/-1；对 ORCA: 会生成 %geom Constraints（仅用于 freeze 原子）
  freeze: [86, 92]
  
  # --- 去重参数 ---
  rmsd_threshold: 0.25
  
  # --- 动态资源管理 ---
  enable_dynamic_resources: false  # 设为 true 启用动态资源限制 (CPU<80%, MEM<80%)

# ============================================================================
# 工作流步骤
# ============================================================================
steps:
  
  # --------------------------------------------------------------------------
  # 步骤 1: 构象生成
  # --------------------------------------------------------------------------
  - name: "step_01"
    type: "confgen"
    params:
      # 注意：YAML 不允许同名 key 重复；重复的 chain 会被覆盖。
      # 多条链请用 chains 列表。
      chains: ["81-79-78-86-92", "121-33", "110-28"]
      #angle_step: 120
      #bond_multiplier: 1.15  
      #optimize: false
      #add_bond: [[1, 2]]
      del_bond: [[86, 69]]
      # no_rotate: []
      # force_rotate: []
  
  # --------------------------------------------------------------------------
  # 步骤 2: 低级优化
  # --------------------------------------------------------------------------
  - name: "step_02"
    type: "calc"
    params:
      iprog: g16
      keyword: "opt(nomicro) external='/opt/uma_scripts/run_uma.sh'"
      itask: opt
      cores_per_task: 1
      total_memory: "240GB"
      max_parallel_jobs: 6
  # --------------------------------------------------------------------------
  # 步骤 3: 低级单点能筛选
  # --------------------------------------------------------------------------
  - name: "step_03"
    type: "calc"
    params:
      iprog: orca
      keyword: "r2SCAN-3c"
      itask: sp
      energy_window: 5.0
      blocks: |
        %cpcm
          smd true
          SMDsolvent "toluene"
        end

# ============================================================================
# 参数说明
# ============================================================================
#
# 【步骤类型】
# - type: "confgen"  构象生成（生成分子构象）
# - type: "calc"     量子计算（执行量子化学计算）
#
# 【程序选择】iprog
# - "gaussian" 或 "g16": Gaussian 16
# - "orca": ORCA
#
# 【任务类型】itask
# - "opt":      结构优化
# - "sp":       单点能计算
# - "freq":     频率分析
# - "opt_freq": 优化 + 频率
# - "ts":       过渡态搜索
#
# 【资源配置】⭐ 支持步骤级别覆盖
# - cores_per_task:    每个任务的 CPU 核心数
# - total_memory:      总内存 (如 "64GB", "4000MB")
# - max_parallel_jobs: 最大并行任务数
# - 在步骤 params 中指定可覆盖全局配置
# - 不指定则使用 global 中的默认值
#
# 【能量筛选】energy_window
# - 单位: kcal/mol
# - 仅保留能量在最低能量 + energy_window 范围内的构象
#
# 【溶剂模型 / 自定义块】blocks
# - 常用溶剂: water, toluene, acetonitrile, dmso, thf, ch2cl2, ethanol
#
# 【冻结原子】freeze
# - 格式: [86, 92]（从 1 开始）
# - 仅对 itask=opt / opt_freq 生效；sp / freq / ts 不生效
#
# ============================================================================
