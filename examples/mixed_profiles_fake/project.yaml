project_id: mixed-profiles-fake
project:
  name: Mixed Profiles Fake
local_paths:
  input_dir: ./inputs
  result_dir: ./results
task_discoveries:
  - name: g16_jobs
    mode: flat_single
    entry_glob: "g16/*.sh"
    task_id_prefix: g16_
    execution_profile: g16
  - name: orca_jobs
    mode: flat_single
    entry_glob: "orca/*.sh"
    task_id_prefix: orca_
    execution_profile: orca
execution_profiles:
  g16:
    label: G16 Fake
    command: "bash {entry_name}"
    defaults:
      max_parallel: 2
  orca:
    label: ORCA Fake
    command: "bash {entry_name}"
    defaults:
      max_parallel: 2
download:
  patterns:
    - result.out
extract:
  results:
    - name: energy
      source_glob: result.out
      regex: "energy=(?P<value>-?\\d+(?:\\.\\d+)?)"
      strategy: last
      type: float

