project_id: analysis-regex
project:
  name: Analysis Regex
local_paths:
  input_dir: ./inputs
  result_dir: ./results
task_discoveries:
  - name: shell_jobs
    mode: flat_single
    entry_glob: "*.sh"
    execution_profile: shell
execution_profiles:
  shell:
    label: Shell
    command: "bash {entry_name}"
    defaults:
      max_parallel: 2
download:
  patterns:
    - result.out
extract:
  results:
    - name: energy
      source_glob: result.out
      regex: "energy=(?P<value>-?\\d+(?:\\.\\d+)?)"
      strategy: last
      type: float
    - name: status
      source_glob: result.out
      regex: "status=(?P<value>\\w+)"
      strategy: first
      type: str
