project_id: directory-mode
project:
  name: Directory Mode
local_paths:
  input_dir: ./inputs
  result_dir: ./results
task_discoveries:
  - name: case_dirs
    mode: directory
    directory_glob: "case_*"
    entry_glob: "run.sh"
    task_id_from: directory_name
    execution_profile: shell
    include:
      - "*.dat"
      - "*.txt"
execution_profiles:
  shell:
    label: Shell
    command: "bash {entry_name}"
    defaults:
      max_parallel: 2
upload:
  task_files:
    include:
      - "{entry_name}"
      - "*.dat"
      - "*.txt"
    exclude: []
    require_entry_file: true
    on_missing: error
download:
  patterns:
    - result.out
extract:
  results:
    - name: score
      source_glob: result.out
      regex: "score=(?P<value>-?\\d+(?:\\.\\d+)?)"
      strategy: last
      type: float
