# mypy configuration for JobDesk project
# Extracted from pyproject.toml [tool.mypy] section for better organization

[mypy]
python_version = 3.13
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
show_error_codes = True
pretty = True
color_output = True
mypy_path = stubs

# Skip problematic third-party stubs with syntax errors
[mypy-rdkit.*]
ignore_missing_imports = True
ignore_errors = True
follow_imports = skip

# ConfFlow 1.4.0 is intentionally shipped without a ``py.typed`` marker.
# JobDesk consumes its runtime API but does not type-check ConfFlow itself.
[mypy-confflow.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-PySide6.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-paramiko.*]
ignore_missing_imports = True

# Type-check the bodies of untyped functions in the non-GUI layers.
[mypy-jobdesk_app.core.*]
check_untyped_defs = True

[mypy-jobdesk_app.remote.*]
check_untyped_defs = True

[mypy-jobdesk_app.services.*]
check_untyped_defs = True

# Strict check for core services
[mypy-jobdesk_app.services.run_repository]
check_untyped_defs = True
disallow_untyped_defs = True

[mypy-jobdesk_app.services.run_coordinator]
check_untyped_defs = True
disallow_untyped_defs = True

[mypy-jobdesk_app.services.run_monitor]
check_untyped_defs = True
disallow_untyped_defs = True

[mypy-jobdesk_app.gui.run_monitor_qt]
check_untyped_defs = True
disallow_untyped_defs = True

# Strict check for worker utilities and helpers
[mypy-jobdesk_app.gui.worker_utils]
check_untyped_defs = True

[mypy-jobdesk_app.gui.pages.settings_servers_helpers]
check_untyped_defs = True

[mypy-jobdesk_app.gui.pages.file_transfer_helpers]
check_untyped_defs = True

# Parsers: re.search() -> Match|None pattern is safe but verbose to annotate.
[mypy-jobdesk_app.core.parsers.gaussian]
disable_error_code = assignment

[mypy-jobdesk_app.core.parsers.orca]
disable_error_code = assignment

# comparison uses PySide6 enum attributes that stubs don't expose.
[mypy-jobdesk_app.services.comparison]
disable_error_code = attr-defined,operator,type-var

# GUI modules use PySide6 enum attributes (e.g. Qt.AlignLeft, QHeaderView.Interactive)
# that type stubs expose under nested enum classes; suppress attr-defined only.
[mypy-jobdesk_app.gui.*]
disable_error_code = attr-defined

[mypy-jobdesk_app.gui.pages.file_transfer_runner]
disable_error_code = attr-defined,arg-type
