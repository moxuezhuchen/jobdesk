# ConfFlow multi-step preset — Confgen ensemble + xTB preopt + r2SCAN-3c SP.
# Demonstrates the WorkflowSpec steps-as-tuple-of-tokens shape.
work_dir: conformer_ensemble_sp
gaussian_path: /opt/g16/g16
orca_path: /opt/orca601/orca
charge: 0
multiplicity: 1
cores_per_task: 8
total_memory: 32GB
max_parallel_jobs: 4
freeze: []
rmsd_threshold: 0.25
energy_window: 5.0
calc:
  program: orca
  method: r2SCAN-3c
  basis: ""
  charge: 0
  multiplicity: 1
  nproc: 8
  memory_mb: 32768
  steps:
    - confgen
    - preopt
    - sp