# Workflow Builder schema hints.
#
# This file is the **only** place to maintain user-facing hint strings for the
# ConfFlow workflow wizard. It is read at GUI startup by
# ``gui.i18n.schema_hints()`` and merged on top of the in-code dictionary in
# ``gui/i18n.py``. Edit a key here and restart the GUI.
#
# Schema:
#   <language>:
#     <hint_key>: <human-readable text>
#
# ``hint_key`` is referenced from ``workflow/schema.py`` and from the
# ``FieldSpec`` / ``StepKindSpec`` catalog. Keep the keys stable; only the
# text changes per language.

zh:
  field.charge: 电荷 (charge)
  field.multiplicity: 多重度 (multiplicity, 2S+1)
  field.cores_per_task: 每任务核数 (cores_per_task)
  field.total_memory: 总内存 (e.g. 8GB / 500MB)
  field.max_parallel_jobs: 最大并行任务数
  field.iprog: 计算程序 (orca / g16)
  field.itask: 任务类型 (opt / sp / freq / opt_freq / ts)
  field.keyword: 计算关键字
  field.freeze: 固定原子索引 (逗号分隔, 0 表示全部)
  field.rmsd_threshold: RMSD 阈值 (Å)
  field.energy_window: 能量窗口 (Hartree)
  field.energy_tolerance: 能量容差 (Hartree)
  field.noH: 比较前去掉氢原子
  field.auto_clean: 完成后自动去重
  field.ts_bond_atoms: TS 键合原子 (1-based 索引对)
  field.ts_rescue_scan: TS 失败时启动扫描救援
  field.scan_coarse_step: 粗扫描步长 (Å)
  field.scan_fine_step: 精扫描步长 (Å)
  field.scan_uphill_limit: 上坡步数限制
  field.sandbox_root: 沙盒根目录
  field.allowed_executables: 允许调用的可执行文件
  field.enable_dynamic_resources: 动态调度资源
  field.resume_from_backups: 从备份恢复
  field.delete_work_dir: 完成后删除工作目录
  field.step_name: 步骤名称
  field.gaussian_path: Gaussian 可执行路径
  field.orca_path: ORCA 可执行路径
  field.blocks: ORCA blocks 文本
  field.orca_maxcore: ORCA 单核内存 (MB)
  field.gaussian_modredundant: Gaussian modredundant 文本
