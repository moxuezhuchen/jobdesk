[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_ignores = False
warn_redundant_casts = True
warn_unused_configs = True
show_error_codes = True
pretty = True
implicit_optional = True
# Remaining suppressed codes (to be tightened progressively):
#   assignment  – many Pydantic / RDKit attribute patterns need review first
#   arg-type    – several numpy / RDKit call signatures aren't stubbed
#   misc        – mix of issues; address per-module over time
#   attr-defined – RDKit / numba dynamic attributes (now enabled)
#   no-any-return – enabled progressively
disable_error_code = assignment,arg-type,misc

# 忽略缺失的第三方库存根
ignore_missing_imports = True

# 对 confflow 包启用逐步严格检查
[mypy-confflow.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True

# 测试文件宽松
[mypy-tests.*]
ignore_errors = True
