# Phase 3 acceptance workflow: fan-out from a single conformer step into
# two parallel calc branches, then fan-in back into a single refinement
# step.
#
# Graph:
#
#     confgen
#        |
#     +--+--+
#     |     |
#   opt_a  opt_b
#     |     |
#     +--+--+
#        |
#      merge
#
# Notes for the reader:
# - "confgen" is the only step with no `inputs` (root).
# - opt_a and opt_b both depend on confgen (fan-out).
# - merge depends on both opt_a and opt_b (fan-in).
# - The engine warns "fan-in is partially supported" and only feeds
#   opt_b's output.xyz (the first declared input) to the merge calc.
global:
  gaussian_path: g16
  orca_path: orca
  iprog: orca
  itask: sp
  keyword: B3LYP
  cores_per_task: 1
  total_memory: 1GB
  max_parallel_jobs: 1
  charge: 0
  multiplicity: 1

steps:
  - name: confgen
    type: confgen
    params:
      chains: ["1-2"]
      angle_step: 120
  - name: opt_a
    type: calc
    inputs: [confgen]
    params:
      iprog: orca
      itask: sp
      keyword: B3LYP
  - name: opt_b
    type: calc
    inputs: [confgen]
    params:
      iprog: orca
      itask: sp
      keyword: B3LYP
  - name: merge
    type: calc
    inputs: [opt_a, opt_b]
    params:
      iprog: orca
      itask: sp
      keyword: B3LYP
