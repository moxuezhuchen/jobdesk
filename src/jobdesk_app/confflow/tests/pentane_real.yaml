# 真实端到端示例：调用 ORCA + Gaussian16。
# 说明：参数以“能跑通真实程序”为目标；建议根据机器资源调整 cores/memory/max_parallel_jobs。

global:
  gaussian_path: "/opt/g16/g16"
  orca_path: "/opt/orca601/orca"

  # ORCA 专用：%maxcore（单位：MB per core）
  orca_maxcore: 4500

  cores_per_task: 24
  total_memory: "200GB"
  max_parallel_jobs: 4

  charge: 0
  multiplicity: 1

  # freeze 仅对 opt/opt_freq 生效；sp/freq/ts 会自动关闭。
  freeze: [1, 5]

  rmsd_threshold: 0.25
  enable_dynamic_resources: false

steps:
  - name: "step_01"
    type: "confgen"
    params:
      chains: ["1-2-3-4-5"]
      chain_steps: ["180,180,180,180"]
      optimize: false

  - name: "step_02_orca_sp"
    type: "calc"
    params:
      iprog: orca
      itask: sp
      # 尽量选择轻量方法；如果你的 ORCA 编译不支持该关键词，可自行替换。
      keyword: "B97-3c"

  - name: "step_03_g16_sp"
    type: "calc"
    params:
      iprog: g16
      itask: sp
      keyword: "sp b3lyp/sto-3g"
