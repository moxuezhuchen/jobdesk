# ============================================================================
# ConfFlow 配置示例 - 计算化学工作流配置
# ============================================================================

global:
  # --- 程序路径 ---
  gaussian_path: "/opt/g16/g16"
  orca_path: "/opt/orca601/orca"
  
  # --- 资源配置 ---
  cores_per_task: 12
  total_memory: "240GB"
  max_parallel_jobs: 4
  
  # --- 体系参数 ---
  charge: 0
  multiplicity: 1

  # --- 冻结原子坐标（仅对 opt/opt_freq 生效）---
  # 对 Gaussian: 在坐标行写 0/-1；对 ORCA: 会生成 %geom Constraints（仅用于 freeze 原子）
  freeze: [86, 92]

  # --- TS 关键键原子对（用于报告中输出 TSBond；会在后续 SP 步骤中继续计算/输出）---
  # 默认：若不显式设置 ts_bond_atoms，则自动使用 freeze 的前两个原子（该功能默认开启）
  # ts_bond_atoms: [1, 2]
  
  # --- 构象去重/筛选参数 ---
  rmsd_threshold: 0.25          # RMSD 去重阈值 (Å)
  # noH: false                  # RMSD 计算时忽略氢原子（默认 false）
  # energy_window: 5.0          # 全局能量窗口 (kcal/mol)；步骤级 energy_window 会覆盖此值
  # energy_tolerance: 0.05      # RMSD 阈值松弛的能量容差 (kcal/mol)；ΔE ≤ tolerance 时阈值放宽 1.5 倍
  
  # --- TS 救援功能 ---
  # ts_rescue_scan: false         # TS 失败后自动 scan 救援（默认关闭）
  # ts_bond_drift_threshold: 0.4  # TS 几何判据：关键键长偏移阈值 (Å)，matches default
  # ts_rmsd_threshold: 1.0        # TS 几何判据：整体 RMSD 阈值 (Å)
  # scan_coarse_step: 0.1         # TS 救援粗扫步长 (Å)
  # scan_fine_step: 0.02          # TS 救援细扫步长 (Å)
  # scan_uphill_limit: 10         # 粗扫中连续能量上坡时停止的步数
  
  # --- 高级选项 ---
  # enable_dynamic_resources: false      # 动态资源监控
  # resume_from_backups: true            # 从备份中恢复已完成任务
  # force_consistency: false             # 多文件输入时允许不一致的原子序列
  # stop_check_interval_seconds: 1       # 检查 STOP 信号的间隔 (秒)

# ============================================================================
# 工作流步骤
# ============================================================================
steps:
  
  # --------------------------------------------------------------------------
  # 步骤 1: 构象生成
  # --------------------------------------------------------------------------
  - name: "step_01"
    type: "confgen"
    # enabled: true               # 设为 false 可跳过此步骤
    params:
      angle_step: 120
      bond_multiplier: 1.15  
      # optimize: false           # MMFF94s 力场预优化（默认关闭）
      # clash_threshold: 0.65     # 碰撞阈值缩放系数
      # rotate_side: "left"       # 旋转哪一侧: "left" 或 "right"
      # validate_chain_bonds: false  # 多文件模式下校验链键合法性
      # 必须指定旋转链（已移除自动柔性键判断）
      chains: ["1-2-3-4"]         # 链原子编号 (1-based, 用 '-' 连接)
      # chain_steps: ["120"]      # 可选：每根键的角度步长
      # chain_angles: ["0,120,240"]  # 可选：显式角度列表
      # 可选：手动修正拓扑/旋转约束（原子编号 1-based）
      # add_bond: [[1, 2]]        # 强制添加键
      # del_bond: [[3, 4]]        # 强制删除键
      # no_rotate: [[2, 3]]       # 禁止旋转指定键（仅对链上键生效）
      # force_rotate: [[2, 3]]    # 强制旋转指定键（一般不需要）
  
  # --------------------------------------------------------------------------
  # 步骤 2: 低级优化
  # --------------------------------------------------------------------------
  - name: "step_02"
    type: "calc"
    params:
      iprog: orca
      keyword: "xTB2 Opt"
      itask: opt
      # --- 资源覆盖（不指定则继承 global）---
      cores_per_task: 4
      total_memory: "240GB"
      max_parallel_jobs: 12
      # --- 能量/去重筛选（auto_clean 后处理）---
      # energy_window: 10.0      # 能量窗口 (kcal/mol)
      # rmsd_threshold: 0.25     # RMSD 去重阈值 (Å)，覆盖 global
      # noH: false               # RMSD 去重忽略氢原子
      # dedup_only: false        # 仅去重，不做能量筛选
      # keep_all_topos: false    # 保留所有拓扑异构体
      # max_conformers: null     # 最大输出构象数
      # imag: null               # 过滤保留指定虚频数（如 imag: 0 只保留无虚频构象）
      # energy_tolerance: 0.05   # RMSD 阈值松弛的能量容差 (kcal/mol)
      # clean_params: null       # 手动指定 clean_opts 字符串（覆盖自动生成）
      # --- ORCA 专用 ---
      # orca_maxcore: null       # ORCA maxcore (MB/core)，自动计算除非手动指定
      # blocks: |                # 附加输入块（溶剂模型、自定义块等）
      #   %scf
      #     MaxIter 300
      #   end
  # --------------------------------------------------------------------------
  # 步骤 3: 低级单点能筛选
  # --------------------------------------------------------------------------
  - name: "step_03"
    type: "calc"
    params:
      iprog: orca
      keyword: "r2SCAN-3c"
      itask: sp
      energy_window: 5.0
      blocks: |
        %cpcm
          smd true
          SMDsolvent "toluene"
        end

  # --------------------------------------------------------------------------
  # 步骤 4: DFT 优化
  # --------------------------------------------------------------------------
  - name: "step_04"
    type: "calc"
    params:
      iprog: orca
      keyword: "opt TPSS D4 def2-sv(p) def2/J"
      itask: opt
      
  # --------------------------------------------------------------------------
  # 步骤 5: 低级单点能筛选
  # --------------------------------------------------------------------------
  - name: "step_05"
    type: "calc"
    params:
      iprog: orca
      keyword: "r2SCAN-3c"
      itask: sp
      energy_window: 3.0
      blocks: |
        %cpcm
          smd true
          SMDsolvent "toluene"
        end

  # --------------------------------------------------------------------------
  # 示例：Gaussian 跨步骤读取 chk（来源不必是“上一步”，可指向任意历史步骤）
  # --------------------------------------------------------------------------
  # - name: "step_06_g16_opt"
  #   type: "calc"
  #   params:
  #     iprog: g16
  #     itask: opt
  #     keyword: "opt(nomicro) b3lyp/6-31g(d)"
  #     gaussian_write_chk: true
  #
  # - name: "step_07_g16_sp_readchk"
  #   type: "calc"
  #   params:
  #     iprog: g16
  #     itask: sp
  #     keyword: "sp guess=read geom=allcheck"
  #     # 从指定步骤的 backups 读取 chk（可填步骤名或 1-based 步骤序号）
  #     chk_from_step: "step_06_g16_opt"   # 或者: chk_from_step: 6

  # --------------------------------------------------------------------------
  # 步骤 6: 过渡态搜索 (TS)
  # --------------------------------------------------------------------------
  - name: "step_06_ts"
    type: "calc"
    params:
      iprog: g16
      itask: ts
      keyword: "opt=(ts,calcfc,noeigen) b3lyp/6-31g(d) freq"
      ts_bond_atoms: [86, 92]
      ts_rescue_scan: true        # 设为 true 则失败后自动进行 scan 尝试救援
      # --- TS scan 救援详细参数（覆盖 global）---
      # scan_coarse_step: 0.1     # 粗扫步长 (Å)
      # scan_fine_step: 0.02      # 细扫步长 (Å)
      # scan_uphill_limit: 10     # 粗扫连续上坡停止步数
      # scan_max_steps: 60        # scan 最大步数
      # scan_fine_half_window: 0.1  # 细扫半窗口宽度 (Å)
      # ts_bond_drift_threshold: 0.4  # 关键键漂移阈值 (Å)
      # ts_rescue_keep_scan_dirs: false  # 保留 scan 临时目录
      # --- Gaussian 专用 ---
      # gaussian_write_chk: true  # 是否写 %Chk
      # gaussian_modredundant: null  # modredundant 输入行
      # gaussian_link0: null      # 自定义 Link0 行
      # ibkout: 1                 # 备份策略: 0=不备份, 1=全部, 2=仅成功, 3=仅失败

# ============================================================================
# 参数说明
# ============================================================================
#
# 【步骤类型】
# - type: "confgen"  构象生成（生成分子构象）
# - type: "calc"     量子计算（执行量子化学计算）
# - enabled: true/false  启用/禁用步骤（默认 true）
#
# 【程序选择】iprog
# - "gaussian" 或 "g16": Gaussian 16
# - "orca": ORCA
#
# 【任务类型】itask
# - "opt":      结构优化
# - "sp":       单点能计算
# - "freq":     频率分析
# - "opt_freq": 优化 + 频率
# - "ts":       过渡态搜索
#
# 【资源配置】⭐ 支持步骤级别覆盖
# - cores_per_task:    每个任务的 CPU 核心数（默认 1）
# - total_memory:      总内存（如 "64GB", "4000MB"，默认 "4GB"）
# - max_parallel_jobs: 最大并行任务数（默认 1）
# - 在步骤 params 中指定可覆盖全局配置
# - 不指定则使用 global 中的默认值
#
# 【能量筛选与去重】calc 步骤后自动执行 (auto_clean)
# - energy_window:     能量窗口 (kcal/mol)，仅保留 E_min + ewin 内的构象
# - rmsd_threshold:    RMSD 去重阈值 (Å，默认 0.25)
# - noH:               RMSD 计算时忽略氢原子（默认 false）
# - dedup_only:        仅执行 RMSD 去重，跳过能量筛选（默认 false）
# - keep_all_topos:    保留所有拓扑异构体（默认 false）
# - max_conformers:    最大输出构象数（默认不限制）
# - imag:              过滤保留指定虚频数（如 imag: 0 只保留无虚频构象）
# - energy_tolerance:  RMSD 阈值松弛的能量容差 (kcal/mol，默认 0.05)
# - clean_params:      手动指定完整 clean_opts 字符串（覆盖自动生成）
#
# 【冻结原子】freeze
# - 格式: [86, 92]（从 1 开始）
# - 仅对 itask=opt / opt_freq 生效；sp / freq / ts 不生效
#
# 【过渡态配置】(itask=ts 时使用)
# - ts_bond_atoms: [1, 2]      # TS 关键键原子对 (1-based)，用于输出键长
# - ts_rescue_scan: false        # TS 失败后自动 scan 救援（默认关闭）
# - scan_coarse_step: 0.1        # 粗扫步长 (Å)
# - scan_fine_step: 0.02         # 细扫步长 (Å)
# - scan_uphill_limit: 10        # 粗扫中连续上坡停止步数
# - scan_max_steps: 60           # scan 最大步数
# - scan_fine_half_window: 0.1   # 细扫半窗口宽度 (Å)
# - ts_bond_drift_threshold: 0.4   # 无 freq 时的几何判据：关键键长漂移阈值 (Å)
# - ts_rmsd_threshold: 1.0         # 无 freq 时的几何判据：整体 RMSD 阈值 (Å)
# - ts_rescue_keep_scan_dirs: false # 保留 scan 临时目录（调试用）
#
# 【Gaussian chk 传递】
# - chk_from_step: step_name 或 step_index (1-based)
#   - 作用：将 <source_step>/backups/{job_name}.chk → {job_name}.old.chk
#           并在输入文件中注入 %OldChk={job_name}.old.chk
#   - 说明：source_step 不必是"上一步"，可以是任意历史步骤
# - gaussian_write_chk: true/false  # 控制是否写 %Chk（默认 true）
# - gaussian_modredundant: null     # 额外 modredundant 输入行
# - gaussian_link0: null            # 自定义 Link0 行
#
# 【额外输入块】blocks（ORCA / Gaussian 通用）
# - orca_maxcore: null    # 手动指定 maxcore (MB/core)，不设则自动计算
# - blocks: |             # 附加输入块文本（ORCA %block 或 Gaussian section 均以此字段传入）
#     %cpcm
#       smd true
#       SMDsolvent "toluene"
#     end
#
# 【备份控制】
# - ibkout: 1             # 0=不备份, 1=全部, 2=仅成功, 3=仅失败
# - resume_from_backups: true  # 从备份中恢复已完成任务（全局）
#
# 【Gibbs 矫正传递】
# - 当某一步（freq/opt_freq）输出注释含 G_corr=... 时，后续 sp 步骤会继承该矫正并输出
#   final_gibbs_energy = E_sp + G_corr（同时仍会在注释中保留 G_corr=...）
#
# 【Confgen 参数】(type: confgen)
# - chains: ["1-2-3-4"]     # 旋转链，必需
# - chain_steps: ["120"]    # 每根键的角度步长
# - chain_angles: ["0,120,240"]  # 显式角度列表
# - angle_step: 120         # 全局默认旋转角度步长
# - bond_multiplier: 1.15   # 键检测共价半径缩放
# - clash_threshold: 0.65   # 碰撞阈值缩放
# - optimize: false          # MMFF94s 力场预优化
# - rotate_side: "left"     # 旋转侧: "left" / "right"
# - validate_chain_bonds: false  # 多文件模式校验链键
# - add_bond / del_bond / no_rotate / force_rotate  # 拓扑修正
#
# ============================================================================
