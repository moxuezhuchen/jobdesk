name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black (gate)
        run: black --check .

      - name: Ruff (gate)
        run: ruff check .

      - name: Mypy (gate)
        run: mypy confflow

      - name: Pytest
        run: pytest -q
