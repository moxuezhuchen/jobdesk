name: coverage-push

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  coverage_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run coverage_push tests
        run: |
          if find tests/coverage_push -maxdepth 1 -type f -name 'test_*.py' | grep -q .; then
            pytest -q tests/coverage_push
          else
            echo "[coverage_push] no test files found under tests/coverage_push, skip."
          fi
